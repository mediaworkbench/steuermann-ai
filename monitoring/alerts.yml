groups:
  - name: framework_alerts
    interval: 30s
    rules:
      - alert: LangGraphTargetDown
        expr: up{job="langgraph"} == 0
        for: 2m
        labels:
          severity: critical
          service: langgraph
        annotations:
          summary: LangGraph target is down
          description: Prometheus cannot scrape langgraph:8000 for at least 2 minutes.

      - alert: HighErrorRate
        expr: sum(rate(langgraph_requests_total{status="error"}[5m])) / clamp_min(sum(rate(langgraph_requests_total[5m])), 1) > 0.1
        for: 5m
        labels:
          severity: warning
          service: langgraph
        annotations:
          summary: High request error rate
          description: Error rate is above 10% for the last 5 minutes.

      - alert: P95LatencyHigh
        expr: histogram_quantile(0.95, sum(rate(langgraph_request_duration_seconds_bucket[5m])) by (le)) > 5
        for: 5m
        labels:
          severity: warning
          service: langgraph
        annotations:
          summary: High p95 request latency
          description: P95 request latency exceeded 5 seconds for 5 minutes.

      - alert: NoSuccessfulRequests
        expr: sum(rate(langgraph_requests_total{status="success"}[10m])) == 0 and sum(rate(langgraph_requests_total[10m])) > 0
        for: 10m
        labels:
          severity: critical
          service: langgraph
        annotations:
          summary: No successful requests
          description: Requests are arriving but none succeeded for 10 minutes.

      - alert: DailyTokenUsageHigh
        expr: sum(increase(langgraph_tokens_used_total[24h])) > 1000000
        for: 10m
        labels:
          severity: warning
          service: langgraph
        annotations:
          summary: Daily token usage high
          description: Token usage in the last 24h exceeded 1,000,000 tokens.

      - alert: MemoryLoadErrorRateHigh
        expr: >
          sum(rate(langgraph_memory_operations_total{status="error"}[5m])) /
          clamp_min(sum(rate(langgraph_memory_operations_total[5m])), 1) > 0.1
        for: 5m
        labels:
          severity: warning
          service: langgraph
        annotations:
          summary: High memory load error rate
          description: >
            More than 10% of memory operations are failing over the last 5 minutes.
            Check Qdrant availability and Mem0 initialization logs (see monitoring.md
            for triage steps).

      - alert: MemoryQualityScoreLow
        expr: >
          sum(langgraph_memory_quality_score_sum) /
          clamp_min(sum(langgraph_memory_quality_score_count), 1) < 0.3
        for: 10m
        labels:
          severity: warning
          service: langgraph
        annotations:
          summary: Memory quality score below threshold
          description: >
            Average importance score has been below 0.3 for 10 minutes.
            Consider reviewing recent memory upserts or the importance scoring
            configuration in core.yaml.

      - alert: FeedbackCoverageLow
        expr: >
          sum(rate(langgraph_memory_rated_after_retrieval_total[30m])) /
          clamp_min(sum(rate(langgraph_memory_retrieval_signal_total[30m])), 0.001) < 0.05
        for: 30m
        labels:
          severity: warning
          service: langgraph
        annotations:
          summary: Memory feedback coverage below 5%
          description: >
            Fewer than 5% of retrieved memories are being rated on the Memories page
            after retrieval. This weakens the retrieval quality feedback loop.
            Check that the Memories page is accessible and ratings are persisting
            to Qdrant (see monitoring.md triage: "Rating persistence failures").

      - alert: MemoryRatingCoverageLow
        expr: >
          sum(langgraph_memory_retrieval_signal_total{rated="yes"}) /
          clamp_min(sum(langgraph_memory_retrieval_signal_total), 1) < 0.10
        for: 1h
        labels:
          severity: warning
          service: langgraph
        annotations:
          summary: Prior rating coverage at retrieval time below 10%
          description: >
            Less than 10% of memories served in chat context carry a prior user rating.
            This means the retrieval quality signal has little historical grounding.
            Encourage users to rate memories on the Memories page to improve future
            retrieval quality.