name: "calculator_tool"
version: "1.0.0"
category: "utilities"
description: "Perform mathematical calculations, unit conversions, and statistical operations"

# Language-specific descriptions (used by semantic tool routing)
descriptions:
  en: "Perform mathematical calculations, unit conversions, and statistical operations. Use for: arithmetic expressions (add, subtract, multiply, divide), percentages, square root, logarithm, trigonometry (sin, cos, tan), mean, median, standard deviation, unit conversion (km to miles, kg to lbs, Celsius to Fahrenheit, bytes to MB, hours to seconds). Trigger phrases: calculate, compute, how much is, what is X times Y, convert X to Y, average of, sum of, percentage of, square root of."
  de: "Mathematische Berechnungen, Einheitenumrechnungen und statistische Operationen durchführen. Verwenden für: arithmetische Ausdrücke (addieren, subtrahieren, multiplizieren, dividieren), Prozente, Quadratwurzel, Logarithmus, Trigonometrie, Mittelwert, Median, Standardabweichung, Einheitenumrechnung (km zu Meilen, kg zu Pfund, Celsius zu Fahrenheit). Auslösephrasen: berechne, rechne, wie viel ist, umrechnen, Durchschnitt, Summe, Prozent, Quadratwurzel."
  fr: "Effectuer des calculs mathématiques, conversions d'unités et opérations statistiques. Pour: expressions arithmétiques (addition, soustraction, multiplication, division), pourcentages, racine carrée, logarithme, trigonométrie, moyenne, médiane, écart-type, conversion d'unités. Phrases déclencheurs: calculer, combien vaut, convertir, moyenne de, somme de, pourcentage."

type: "langchain_tool"
entry_point: "universal_agentic_framework.tools.calculator.tool:CalculatorTool"

# No external dependencies required (uses Python stdlib + math)
dependencies: []

# Configuration schema
config_schema:
  max_expression_length:
    type: "integer"
    default: 500
    description: "Maximum length of expression string to evaluate (security limit)"
  precision:
    type: "integer"
    default: 10
    description: "Decimal precision for results"

# Permissions required
permissions:
  - "system:compute"

# Cost estimate (local operation, free)
cost_per_call: 0.0
