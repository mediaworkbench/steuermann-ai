name: "file_ops_tool"
version: "1.0.0"
category: "utilities"
description: "Read, write, and list files and directories within a sandboxed workspace"

# Language-specific descriptions (used by semantic tool routing)
descriptions:
  en: "Read, write, and list files and directories within a sandboxed workspace. Operations: read file content, show file contents, write or create a file, list directory contents, check if a file exists, get file metadata (size, modification time). Use when asked to: read a file, open a file, show me what's in a file, write to a file, save text to a file, list files in a directory, list all files, does this file exist, create a new file."
  de: "Dateien und Verzeichnisse lesen, schreiben und auflisten. Operationen: Dateiinhalt lesen, anzeigen, schreiben oder erstellen, Verzeichnisinhalte auflisten, prüfen ob eine Datei existiert, Datei-Metadaten abrufen. Verwenden wenn gefragt: Datei lesen, Datei öffnen, was steht in der Datei, in Datei schreiben, Text in Datei speichern, Dateien auflisten, Datei erstellen."
  fr: "Lire, écrire et lister des fichiers et répertoires dans un espace de travail sécurisé. Opérations: lire le contenu d'un fichier, afficher le contenu, écrire ou créer un fichier, lister un répertoire, vérifier l'existence d'un fichier. À utiliser pour: lire un fichier, ouvrir un fichier, écrire dans un fichier, sauvegarder du texte, lister les fichiers, créer un fichier."

type: "langchain_tool"
entry_point: "universal_agentic_framework.tools.file_ops.tool:FileOpsTool"

# No external dependencies required
dependencies: []

# Configuration schema
config_schema:
  sandbox_dir:
    type: "string"
    default: ""
    description: "Root directory for sandboxed file operations. Empty string means current working directory."
  max_read_size_bytes:
    type: "integer"
    default: 1048576
    description: "Maximum file size to read (default 1MB)"
  max_write_size_bytes:
    type: "integer"
    default: 1048576
    description: "Maximum file size to write (default 1MB)"
  allowed_extensions:
    type: "array"
    default: [".txt", ".md", ".json", ".yaml", ".yml", ".csv", ".xml", ".html", ".log", ".py", ".js", ".ts"]
    description: "Allowed file extensions for read/write operations"

# Permissions required
permissions:
  - "filesystem:read"
  - "filesystem:write"

# Cost estimate (local operation, free)
cost_per_call: 0.0
