name: "datetime_tool"
version: "1.0.0"
category: "utilities"
description: "Get current date/time and perform datetime operations"

# Language-specific descriptions (used by semantic tool routing)
descriptions:
  en: "Get the current date and time, or convert between timezones. Use when the user asks: what time is it, what is today's date, current date and time, what day is it today, what's the current time, convert time to another timezone. Supports IANA timezone names (Europe/Berlin, America/New_York, Asia/Tokyo). Also use for: how old am I, what year is it, what month is it, what's the date today."
  de: "Aktuelle Uhrzeit und Datum abrufen, oder zwischen Zeitzonen umrechnen. Verwenden wenn der Nutzer fragt: Wie spät ist es, welcher Tag ist heute, aktuelles Datum und Uhrzeit, was ist die aktuelle Zeit, Uhrzeit in einer anderen Zeitzone. Unterstützt IANA-Zeitzonennamen (Europe/Berlin, America/New_York). Auch für: wie alt bin ich, welches Jahr ist es, welcher Monat ist es."
  fr: "Obtenir la date et l'heure actuelles, ou convertir entre fuseaux horaires. À utiliser quand l'utilisateur demande: quelle heure est-il, quelle est la date d'aujourd'hui, heure actuelle, quel jour sommes-nous, convertir l'heure vers un autre fuseau horaire. Supporte les noms IANA (Europe/Paris, America/New_York)."

type: "langchain_tool"
entry_point: "universal_agentic_framework.tools.datetime.tool:DateTimeTool"

# No external dependencies required (uses Python stdlib)
dependencies: []

# Configuration schema
config_schema:
  default_timezone:
    type: "string"
    default: "UTC"
    description: "Default timezone (e.g., 'Europe/Berlin', 'America/New_York')"

# Permissions required
permissions:
  - "system:time"

# Cost estimate (local operation, free)
cost_per_call: 0.0
