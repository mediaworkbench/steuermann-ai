fork:
  name: $PROFILE_ID

database:
  url: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}"
  pool_size: 10
  echo: false

memory:
  vector_store:
    type: "mem0"
    host: $QDRANT_HOST
    port: 6333
    collection_prefix: $PROFILE_ID
  embeddings:
    model: "text-embedding-granite-embedding-278m-multilingual"
    dimension: 768
    provider: "remote"
    remote_endpoint: $EMBEDDING_SERVER
    batch_size: 32
  retention:
    session_memory_days: 90
    user_memory_days: 365
  mem0:
    search_limit: 10
    custom_instructions: null
    llm_provider: "lmstudio"
    co_occurrence_fanout_cap: 5
    co_occurrence_prune_interval_seconds: 300
    co_occurrence_related_top_k_per_memory: 5

checkpointing:
  enabled: true
  backend: "sqlite"
  sqlite_path: "./data/checkpoints/langgraph_checkpoints.sqlite"
  postgres_dsn: "${CHECKPOINTER_POSTGRES_DSN}"
