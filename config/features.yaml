# Feature flags
multi_agent_crews: false
long_term_memory: true
ingestion_service: true
rag_retrieval: true

# Memory features
memory_importance_scoring: true  # Enable importance-based reranking
memory_include_related: true     # Fetch related memories via co-occurrence
memory_top_k: 5                  # Number of primary memories to retrieve

# Memory layer emergency rollback switches (set to false to disable during development/debugging)
memory_load_enabled: true        # Enable load_memory_node() operation; disable to skip retrieval
memory_update_enabled: true      # Enable update_memory_node() operation; disable to skip persistence
memory_co_occurrence_enabled: true  # Enable co-occurrence tracking; disable to bypass knowledge graph
memory_digest_chain_enabled: true   # Enable digest chain propagation to memory; disable for baseline behavior

# Optional features
authentication: false
monitoring: false  # enable in production

# UI features
ui_tool_visualization: true
ui_token_counter: true
ui_export_chat: true
crew_result_caching: true
crew_cache_ttl_seconds: 3600

# Crew deep integration
crew_chaining: false          # Enable multi-crew pipelines
crew_parallel_execution: false # Enable concurrent crew execution
crew_result_validation: true   # Validate crew outputs via Pydantic
