# Deployment-global feature flags.
# These are intentionally NOT overridable by profiles (enforced by _DISALLOWED_PROFILE_FEATURE_FLAGS).
# Note: these flags are documentary — they record deployment intent but do not gate runtime code directly.
#   authentication: controlled by AUTH_ENABLED env var (read by FastAPI and Next.js)
#   ingestion_service: controlled by whether the ingestion container is running (docker-compose)
#   monitoring: Prometheus scraping is always active; this flag is informational
# All other feature flags belong in config/profiles/<id>/features.yaml.

authentication: false
ingestion_service: true
monitoring: false
