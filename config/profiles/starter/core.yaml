# Starter profile — authoritative configuration.
# This file is the single source of truth for all profile-specific settings.
# Scaffold new profiles with: steuermann profile scaffold --from starter --profile <id>

profile:
  language: "de"
  locale: "de_DE"
  timezone: "Europe/Berlin"
  supported_languages:
    - "de"
    - "en"

llm:
  roles:
    chat:
      provider_id: "lmstudio"
      api_base: $LLM_PROVIDERS_LMSTUDIO_API_BASE
      model: "openai/google/gemma-4-e4b"
      temperature: 0.3
      max_tokens: 16384            # output cap (NOT the context window)
      timeout: 600
      # context_window_tokens: 16384  # optional: true prompt budget for the context-window
      #                               # indicator. Auto-detected from the provider when omitted;
      #                               # set this to pin it (e.g. model loaded with a smaller
      #                               # window than its max, or provider doesn't report it).
      # model_tool_calling:
      #   openai/google/gemma-4-e4b: "native"  # enable when capability probe confirms support
    embedding:
      provider_id: "lmstudio"
      api_base: $LLM_PROVIDERS_LMSTUDIO_API_BASE
      model: "openai/text-embedding-granite-embedding-278m-multilingual"
      temperature: 0.0
      timeout: 300
    vision:
      provider_id: "lmstudio"
      api_base: $LLM_PROVIDERS_LMSTUDIO_API_BASE
      model: "openai/google/gemma-4-e4b"
      temperature: 0.2
      max_tokens: 2048
      timeout: 600
    auxiliary:
      provider_id: "lmstudio"
      api_base: $LLM_PROVIDERS_LMSTUDIO_API_BASE
      model: "openai/google/gemma-4-e2b"
      temperature: 0.2
      max_tokens: 16384
      timeout: 600
  router:
    routing_strategy: "simple-shuffle"
    num_retries: 3
    retry_after: 1
    enable_pre_call_checks: true
    default_max_parallel_requests: 4

memory:
  embeddings:
    model: "text-embedding-granite-embedding-278m-multilingual"
    dimension: 768
    provider: "remote"
    remote_endpoint: $EMBEDDING_SERVER
    batch_size: 32
  retention:
    session_memory_days: 90
    user_memory_days: 365
  mem0:
    search_limit: 10
    custom_instructions: null
    llm_provider: "lmstudio"
    co_occurrence_fanout_cap: 5
    co_occurrence_prune_interval_seconds: 300
    co_occurrence_related_top_k_per_memory: 5
    infer_enabled: true

rag:
  enabled: true
  collection_name: framework
  top_k: 5
  pill_score_threshold: 0.72
  query_rewriting:
    enabled: true
    num_variants: 2
  with_payload:
    - text
    - file_path
    - detected_language
    - language_confidence
  with_vectors: false
  timeout_seconds: 30

ingestion:
  source_path: $RAG_DATA_PATH
  language: "de"
  language_threshold: 0.8
  embedding_batch_size: 32
  upsert_batch_size: 128
  file_concurrency: 1
  incremental_mode: true
  phase_timing: true
  reingest_timeout_seconds: 1800

tokens:
  default_budget: 10000
  conversation_budget: null
  per_turn_budget: null
  per_turn_budget_ratio: 0.4
  response_reserve_ratio: 0.15
  enforce_per_node_hard_limit: true
  per_node_budgets: {}

# Prompt templates loaded from config/profiles/starter/prompts/{lang}.yaml.

tool_routing:
  similarity_threshold: 0.55
  top_k: 5
  intent_boost: 0.2
  max_retries: 2
  min_top_score: 0.7
  min_spread: 0.10
